{
  "layer": "top",

  "modules-left": ["hyprland/workspaces", "hyprland/window"],
  "modules-center": ["clock"],
  "modules-right": ["cpu", "custom/gpu", "memory", "disk", "pulseaudio", "battery", "network"],

  "clock": {
    "format": "%a %b %d %H:%M"
  },

  "cpu": {
    "format": "CPU: {usage}%"
  },

  "memory": {
    "format": "RAM: {used}/{total}GB"
  },

  "disk": {
    "path": "/",
    "format": "SSD: {used}/{total}GB"
  },

  "pulseaudio": {
    "format": "Vol: {volume}%"
  },

  "battery": {
    "format": "{capacity}%",
    "format-charging": " ⚡{capacity}%",
    "format-full": " ⚡⚡{capacity}%",
    "interval": 5
  },
"network": {
  "interface": "wlan0",
  "format-wifi": ".ıI {signalStrength}% {ipaddr}",
  "format-ethernet": "e {ipaddr}",
  "format-disconnected": " :( Offline",
  "tooltip-format": "{essid}  {signalStrength}%",
  "interval": 5
}

}
